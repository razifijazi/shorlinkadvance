<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>{% block title %}ShortLink{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <nav class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="{{ url_for('index') }}" class="text-lg font-bold text-slate-800">
        🔗 ShortLink
      </a>
      <div class="flex items-center gap-4 text-sm">
        <a href="{{ url_for('index') }}" class="text-slate-600 hover:text-slate-900">Links</a>
        <a href="{{ url_for('domains_page') }}" class="text-slate-600 hover:text-slate-900">Domains</a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-6">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-4 space-y-2">
          {% for cat, msg in messages %}
            <div class="px-4 py-2 rounded-md text-sm
              {% if cat == 'error' %}bg-red-50 text-red-800 border border-red-200
              {% else %}bg-green-50 text-green-800 border border-green-200{% endif %}">
              {{ msg }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
